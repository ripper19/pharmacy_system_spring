spring.application.name=pharmacy_management

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.url=${REDIS_URL}
spring.session.redis.flush-mode=ON_SAVE
spring.session.redis.namespace=spring:session
spring.redis.port=6379

server.servlet.session.timeout=12000
server.servlet.session.cookie.name=COOKIE
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=none


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.jackson.time-zone=Africa/Nairobi
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Nairobi